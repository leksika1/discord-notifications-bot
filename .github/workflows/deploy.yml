name: CI/CD

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest

      - name: Run tests (if present)
        run: |
          if ls -1 test*.py 1>/dev/null 2>&1 || [ -d tests ]; then pytest -q; else echo "No tests"; fi

      - name: Check secrets exist
        run: |
          echo "VPS_HOST set? ${{ secrets.VPS_HOST != '' }}"
          echo "VPS_USER set? ${{ secrets.VPS_USER != '' }}"
          echo "SSH_PRIVATE_KEY set? ${{ secrets.SSH_PRIVATE_KEY != '' }}"

  build_and_deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Prepare image tag
        id: vars
        run: echo "image=ghcr.io/${GITHUB_REPOSITORY,,}:latest" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR (push)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.vars.outputs.image }}
      - name: Fail fast if VPS_HOST missing
        if: ${{ secrets.VPS_HOST == '' }}
        run: |
          echo "VPS_HOST secret is empty or not доступен этому workflow"
          exit 1
      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -eu

            APP_DIR="${{ secrets.APP_DIR }}"
            IMAGE="${{ steps.vars.outputs.image }}"

            mkdir -p "$APP_DIR/data"
            cd "$APP_DIR"

            cat > docker-compose.yml <<EOF
            services:
              rok-bot:
                image: ${IMAGE}
                restart: unless-stopped
                env_file: .env
                volumes:
                  - ./data:/app/data
                environment:
                  - STATE_PATH=/app/data/state.json
                  - PYTHONUNBUFFERED=1
            EOF

            cat > .env <<'EOF'
            ${{ secrets.ENV_FILE }}
            EOF
            chmod 600 .env

            echo "${{ secrets.GHCR_READ_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USER }}" --password-stdin

            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
      
